name: Video Update

on:
  schedule:
    - cron: '0 * * * *'  # Her saat başı
  workflow_dispatch:  # Manuel tetikleme

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check for new videos (RSS)
        id: check
        run: node scripts/check-new-videos.js

      - name: Install Deno (for yt-dlp JS challenge solving)
        if: steps.check.outputs.new_videos == 'true' || github.event_name == 'workflow_dispatch'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install yt-dlp
        if: steps.check.outputs.new_videos == 'true' || github.event_name == 'workflow_dispatch'
        run: pip install --upgrade yt-dlp

      - name: Fetch new videos
        if: steps.check.outputs.new_videos == 'true' || github.event_name == 'workflow_dispatch'
        run: node scripts/fetch-videos.js

      - name: Fetch upload dates for new videos
        if: steps.check.outputs.new_videos == 'true' || github.event_name == 'workflow_dispatch'
        run: node scripts/fetch-dates.js

      - name: Geocode new videos
        if: steps.check.outputs.new_videos == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/geocode.js

      - name: Update RSS snapshot
        run: node -e "const ids='${{ steps.check.outputs.rss_ids }}'.split(',').filter(Boolean); if(ids.length) require('fs').writeFileSync('last_rss.json', JSON.stringify(ids,null,2)+'\n')"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_rss.json raw_videos.json videos.json
          git diff --staged --quiet || git commit -m "Update video data $(date +%Y-%m-%d)"
          git push
